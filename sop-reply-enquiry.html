<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOP - Reply Enquiry</title>
  <link rel="icon" href="spm.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #064e3b; 
      --bg-gradient-end: #020617;
      --card-bg: rgba(16, 185, 129, 0.05);
      --card-border: rgba(16, 185, 129, 0.2);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-heading: #ffffff;
      --accent-primary: #10b981; 
      --accent-hover: #34d399;
      --accent-success: #059669;
      --code-bg: rgba(0, 0, 0, 0.4);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --input-bg: rgba(0, 0, 0, 0.3);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      flex-grow: 1;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* Input Section Styles */
    .input-section {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px var(--shadow-color);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent-primary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    textarea {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      min-height: 60px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .prompts-stack {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Prompt Card Styles */
    .prompt-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 10px 40px var(--shadow-color);
      backdrop-filter: blur(12px);
      padding: 35px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    .prompt-card:hover {
        transform: translateY(-5px);
        border-color: var(--accent-primary);
    }
    .prompt-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .prompt-label::after {
      content: "";
      height: 1px;
      flex-grow: 1;
      background: var(--card-border);
    }
    .prompt-text {
      background-color: var(--code-bg);
      padding: 24px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Source Code Pro', monospace;
      font-size: 1rem;
      color: #ecfdf5;
      line-height: 1.5;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      max-height: 500px;
      overflow-y: auto;
    }
    
    /* Button Styles */
    .copy-button {
      align-self: flex-end;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      background-color: var(--accent-primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .copy-button:hover {
      background-color: var(--accent-hover);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
    }
    .copy-button.copied {
      background-color: var(--accent-success);
    }
    .icon { width: 18px; height: 18px; }
    .copied-icon { display: none; }
    .copy-button.copied .copy-icon { display: none; }
    .copy-button.copied .copied-icon { display: inline-block; }

    footer {
        margin-top: 60px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.85rem;
        padding-bottom: 40px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>SOP - Reply Enquiry</h1>
    </header>

    <div class="input-section">
      <div class="input-group">
        <label for="res1Input">[Result 1]</label>
        <textarea id="res1Input" placeholder="First outcome or benefit..."></textarea>
      </div>
      <div class="input-group">
        <label for="res2Input">[Result 2]</label>
        <textarea id="res2Input" placeholder="Second outcome or benefit..."></textarea>
      </div>
      <div class="input-group">
        <label for="priceInput">[Price]</label>
        <textarea id="priceInput" placeholder="Enter numerical price..."></textarea>
      </div>
    </div>

    <main class="prompts-stack">
      
      <div class="prompt-card">
        <div class="prompt-label">Reply Enquiry Prompt</div>
        <pre id="displayP1" class="prompt-text">This SOP shows exactly how to:

- [Result 1]
- [Result 2]

You just follow it step-by-step.

Price: ₹[Price]

Want access?</pre>
        <button class="copy-button" onclick="copyText('displayP1', this)">
          <svg class="icon copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
          <svg class="icon copied-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
          <span class="button-text">Copy Prompt</span>
        </button>
      </div>

    </main>

    <footer>
        <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const res1In = document.getElementById('res1Input');
    const res2In = document.getElementById('res2Input');
    const priceIn = document.getElementById('priceInput');
    const displayP1 = document.getElementById('displayP1');

    const baseP1 = displayP1.textContent;

    function updateDisplays() {
      const val1 = res1In.value.trim() || '[Result 1]';
      const val2 = res2In.value.trim() || '[Result 2]';
      const valPrice = priceIn.value.trim() || '[Price]';
      
      let updated = baseP1.split('[Result 1]').join(val1);
      updated = updated.split('[Result 2]').join(val2);
      updated = updated.split('[Price]').join(valPrice);
      
      displayP1.textContent = updated;
    }

    res1In.addEventListener('input', updateDisplays);
    res2In.addEventListener('input', updateDisplays);
    priceIn.addEventListener('input', updateDisplays);

    function copyText(elementId, btn) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btnText = btn.querySelector('.button-text');
        const prevText = btnText.textContent;
        btnText.textContent = 'Copied!';
        btn.classList.add('copied');
        
        setTimeout(() => {
          btnText.textContent = prevText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>

</body>
</html>
